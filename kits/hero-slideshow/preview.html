<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Slideshow Preview</title>
    <link rel="stylesheet" href="hero-slideshow.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .hero-slideshow__label { color: #d4a017; }
        .hero-slideshow__title { font-family: Georgia, 'Times New Roman', serif; }
        .hero-slideshow__slide:nth-child(1) {
            background: linear-gradient(135deg, #8B6914 0%, #5a3e0a 50%, #3d2a06 100%);
        }
        .hero-slideshow__slide:nth-child(2) {
            background: linear-gradient(135deg, #3d2a06 0%, #1a1208 50%, #5a3e0a 100%);
        }
        .hero-slideshow__slide:nth-child(3) {
            background: linear-gradient(135deg, #5a3e0a 0%, #8B6914 50%, #3d2a06 100%);
        }
        .btn {
            display: inline-block;
            padding: 0.9rem 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn--primary { background: #b42318; color: #fff; border: 2px solid #b42318; }
        .btn--outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.5); }
        .after-hero { padding: 3rem 2rem; text-align: center; background: #faf6f0; color: #888; }
    </style>
</head>
<body>

    <section class="hero-slideshow" data-interval="5000">
        <div class="hero-slideshow__slides">
            <div class="hero-slideshow__slide is-active"></div>
            <div class="hero-slideshow__slide"></div>
            <div class="hero-slideshow__slide"></div>
        </div>
        <div class="hero-slideshow__overlay"></div>
        <div class="hero-slideshow__content">
            <p class="hero-slideshow__label">Welcome to</p>
            <h1 class="hero-slideshow__title">Your City's Home for<br>Authentic Cuisine</h1>
            <p class="hero-slideshow__text">Bold flavors and family tradition — every dish is crafted with recipes passed down through generations. Made fresh, served with love.</p>
            <div class="hero-slideshow__buttons">
                <a href="#" class="btn btn--primary">View Menu</a>
                <a href="#" class="btn btn--outline">Our Story</a>
            </div>
        </div>
        <div class="hero-slideshow__indicators">
            <button class="hero-slideshow__dot is-active" aria-label="Slide 1"></button>
            <button class="hero-slideshow__dot" aria-label="Slide 2"></button>
            <button class="hero-slideshow__dot" aria-label="Slide 3"></button>
        </div>
    </section>

    <div class="after-hero">
        <p>Content continues below the hero...</p>
    </div>

    <script src="hero-slideshow.js"></script>
</body>
</html>
