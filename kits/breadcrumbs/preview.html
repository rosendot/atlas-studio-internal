<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breadcrumbs Preview</title>
    <link rel="stylesheet" href="breadcrumbs.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf6f0; color: #2c2416; }
        .breadcrumbs { background: #fff; border-bottom: 1px solid #e0d6c8; }
        .breadcrumbs__link { color: #2c2416; }
        .demo-header { background: #1a1208; color: #faf6f0; padding: 1rem 2rem; font-family: Georgia, serif; font-weight: 700; }
        .demo-content { padding: 2rem; color: #888; }
    </style>
</head>
<body>
    <div class="demo-header">Business Name</div>
    <nav class="breadcrumbs">
        <ol class="breadcrumbs__list">
            <li class="breadcrumbs__item"><a class="breadcrumbs__link" href="#">Home</a> <span class="breadcrumbs__separator">›</span></li>
            <li class="breadcrumbs__item"><a class="breadcrumbs__link" href="#">Menu</a> <span class="breadcrumbs__separator">›</span></li>
            <li class="breadcrumbs__item"><a class="breadcrumbs__link" href="#">Appetizers</a> <span class="breadcrumbs__separator">›</span></li>
            <li class="breadcrumbs__item"><span class="breadcrumbs__current">Bruschetta</span></li>
        </ol>
    </nav>
    <div class="demo-content"><p>Page content below breadcrumbs...</p></div>
</body>
</html>
