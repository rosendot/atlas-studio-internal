<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Video Preview</title>
    <link rel="stylesheet" href="hero-video.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .hero-video__label { color: #d4a017; }
        .hero-video__title { font-family: Georgia, 'Times New Roman', serif; }
        /* Simulated video background with animated gradient */
        .hero-video__bg-sim {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #8B6914 0%, #5a3e0a 25%, #3d2a06 50%, #5a3e0a 75%, #8B6914 100%);
            background-size: 400% 400%;
            animation: shimmer 8s ease infinite;
            z-index: 0;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn {
            display: inline-block;
            padding: 0.9rem 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn--primary { background: #b42318; color: #fff; border: 2px solid #b42318; }
        .btn--outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.5); }
        .play-badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 3;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .after-hero { padding: 3rem 2rem; text-align: center; background: #faf6f0; color: #888; }
    </style>
</head>
<body>

    <section class="hero-video">
        <div class="hero-video__bg-sim"></div>
        <div class="hero-video__overlay"></div>
        <div class="play-badge">&#9654; Video Background</div>
        <div class="hero-video__content">
            <p class="hero-video__label">Welcome to</p>
            <h1 class="hero-video__title">Your City's Home for<br>Authentic Cuisine</h1>
            <p class="hero-video__text">Bold flavors and family tradition — every dish is crafted with recipes passed down through generations. Made fresh, served with love.</p>
            <div class="hero-video__buttons">
                <a href="#" class="btn btn--primary">View Menu</a>
                <a href="#" class="btn btn--outline">Our Story</a>
            </div>
        </div>
    </section>

    <div class="after-hero">
        <p>Content continues below the hero...</p>
    </div>

</body>
</html>
