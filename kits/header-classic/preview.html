<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Classic Preview</title>
    <link rel="stylesheet" href="header-classic.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf6f0; }
        .header-classic { background: #1a1208; color: #faf6f0; }
        .header-classic__logo { color: #faf6f0; font-family: Georgia, serif; }
        .header-classic__nav a { color: #faf6f0; }
        .header-classic__cta { background: #b42318; color: #fff; }
        .header-classic__hamburger span { background: #faf6f0; }
        .demo-content { padding: 4rem 2rem; text-align: center; color: #888; }
    </style>
</head>
<body>
    <header class="header-classic">
        <div class="header-classic__inner">
            <a href="#" class="header-classic__logo">Business Name</a>
            <ul class="header-classic__nav">
                <li><a href="#">Home</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <a href="#" class="header-classic__cta">Reserve</a>
            <button class="header-classic__hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
    </header>
    <div class="demo-content"><p>Page content below the header...</p></div>
    <script src="header-classic.js"></script>
</body>
</html>
