<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Minimal Preview</title>
    <link rel="stylesheet" href="footer-minimal.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .footer-minimal { background: #1a1208; color: #faf6f0; }
        .footer-minimal__brand { font-family: Georgia, 'Times New Roman', serif; }
        .footer-minimal__social-link { color: #faf6f0; }
        .before-footer { padding: 4rem 2rem; text-align: center; background: #faf6f0; color: #888; }
    </style>
</head>
<body>
    <div class="before-footer"><p>Page content above footer...</p></div>
    <footer class="footer-minimal">
        <div class="footer-minimal__inner">
            <div class="footer-minimal__brand">Business Name</div>
            <span class="footer-minimal__copy">&copy; 2026 Business Name. All rights reserved.</span>
            <div class="footer-minimal__social">
                <a href="#" class="footer-minimal__social-link">FB</a>
                <a href="#" class="footer-minimal__social-link">IG</a>
                <a href="#" class="footer-minimal__social-link">YP</a>
            </div>
        </div>
    </footer>
</body>
</html>
