<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Wall Preview</title>
    <link rel="stylesheet" href="logo-wall.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf6f0; color: #2c2416; }
        .logo-wall__placeholder { color: #6b5e4f; }
    </style>
</head>
<body>
    <section class="logo-wall">
        <div class="logo-wall__header">
            <h2 class="logo-wall__title">Trusted By</h2>
        </div>
        <div class="logo-wall__grid">
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Acme Co</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Globex</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Initech</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Umbrella</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Wonka</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Stark</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Wayne</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Oscorp</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Cyberdyne</span></div>
            <div class="logo-wall__item"><span class="logo-wall__placeholder">Tyrell</span></div>
        </div>
    </section>
</body>
</html>
